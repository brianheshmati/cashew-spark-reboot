name: Send Collection Reminders

on:
  schedule:
    # Every day at 8 AM UTC
    - cron: '0 8 * * *'

  workflow_dispatch:

jobs:
  call-edge-function:
    runs-on: ubuntu-latest

    steps:
      - name: Call Supabase Edge Function
        run: |
          curl -X POST "${{ secrets.EDGE_FUNCTION_URL }}" \
            -H "Authorization: Bearer ${{ secrets.EDGE_FUNCTION_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{}'